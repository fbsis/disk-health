<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Disk Health Remote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg"></div>
    <div class="container py-4">
      <header class="d-flex flex-wrap align-items-center justify-content-between mb-4">
        <div>
          <h1 class="display-6 fw-semibold">Disk Health Remote</h1>
          <p class="text-muted mb-0">Monitoramento remoto via SSH</p>
        </div>
        <div class="d-flex gap-2">
          <button id="btn-collect" class="btn btn-primary">
            Coletar agora
          </button>
          <button id="btn-refresh" class="btn btn-outline-secondary">
            Atualizar lista
          </button>
        </div>
      </header>

      <section class="card shadow-sm mb-4">
        <div class="card-body">
          <div class="d-flex flex-wrap gap-3 align-items-center">
            <div class="stat">
              <div class="stat-label">Última coleta</div>
              <div class="stat-value" id="last-timestamp">-</div>
            </div>
            <div class="stat">
              <div class="stat-label">Discos</div>
              <div class="stat-value" id="disk-count">-</div>
            </div>
          <div class="stat">
            <div class="stat-label">Host</div>
            <div class="stat-value" id="host-name">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">Total usado</div>
            <div class="stat-value" id="total-used">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">Total disponível</div>
            <div class="stat-value" id="total-avail">-</div>
          </div>
        </div>
      </div>
    </section>

      <section class="mb-4">
        <div class="d-flex align-items-center justify-content-between mb-2">
          <h2 class="h4 mb-0">Discos atuais</h2>
        </div>
        <div id="disks" class="row g-3"></div>
      </section>

      <section class="mb-4">
        <div class="d-flex align-items-center justify-content-between mb-2">
          <h2 class="h4 mb-0">Histórico</h2>
        </div>
        <div class="card shadow-sm">
          <div class="card-body">
            <div id="history" class="table-responsive"></div>
          </div>
        </div>
      </section>

      <section class="mb-5">
        <div class="d-flex align-items-center justify-content-between mb-2">
          <h2 class="h4 mb-0">Comparar snapshots</h2>
        </div>
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="row g-2 align-items-end">
              <div class="col-md-5">
                <label class="form-label">Snapshot A</label>
                <select id="compare-a" class="form-select"></select>
              </div>
              <div class="col-md-5">
                <label class="form-label">Snapshot B</label>
                <select id="compare-b" class="form-select"></select>
              </div>
              <div class="col-md-2">
                <button id="btn-compare" class="btn btn-outline-primary w-100">
                  Comparar
                </button>
              </div>
            </div>
            <div id="compare-result" class="mt-3"></div>
          </div>
        </div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
